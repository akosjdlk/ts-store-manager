<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bevetelezes</title>
    <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-cyan-50 text-slate-800 dark:from-slate-900 dark:via-slate-800 dark:to-slate-950 dark:text-slate-100">
    <header class="bg-light_header/95 backdrop-blur-md dark:bg-dark_color/95 h-24 drop-shadow-lg flex flex-row items-center p-3 w-full relative border-b border-slate-200/70 dark:border-slate-700/70 z-20">
    <div class="hidden md:flex flex-row items-center space-x-5">
      <a href="stockup.html" title="Bevételezés">
        <div class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
        </div>
      </a>
      <a href="backend_data.html" title="Nyilvántartás">
        <div class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/></svg>
        </div>
      </a>
      <a href="sales.html" title="Eladások">
        <div class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14"><path d="M12 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5"/><path d="M18 12h.01"/><path d="M19 22v-6"/><path d="m22 19-3-3-3 3"/><path d="M6 12h.01"/><circle cx="12" cy="12" r="2"/></svg>
        </div>
      </a>
      <a href="backend_charts.html" title="Kijelentkezés">
          <div class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14 lucide lucide-log-out-icon lucide-log-out"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
          </div>
      </a>
    </div>

    <div class="flex md:hidden relative">
      <button id="menu-button" class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full focus:outline-none hover:bg-darker hover:dark:bg-darker_light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
      </button>

      <div id="dropdown-menu" class="hidden absolute left-0 top-14 bg-light_header dark:bg-dark_color border border-light_color dark:border-darker rounded-xl shadow-xl p-3 flex flex-col space-y-3 z-50 min-w-[180px]">
        <a href="stockup.html" class="flex items-center space-x-3 p-2 hover:bg-light_color hover:dark:bg-darker rounded-lg text-dark_color dark:text-light_color">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
          <span class="font-medium text-sm">Bevételezés</span>
        </a>
        <a href="backend_data.html" class="flex items-center space-x-3 p-2 hover:bg-light_color hover:dark:bg-darker rounded-lg text-dark_color dark:text-light_color">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/></svg>
          <span class="font-medium text-sm">Nyilvántartás</span>
        </a>
        <a href="sales.html" class="flex items-center space-x-3 p-2 hover:bg-light_color hover:dark:bg-darker rounded-lg text-dark_color dark:text-light_color">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M12 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5"/><path d="M18 12h.01"/><path d="M19 22v-6"/><path d="m22 19-3-3-3 3"/><path d="M6 12h.01"/><circle cx="12" cy="12" r="2"/></svg>
          <span class="font-medium text-sm">Eladások</span>
        </a>
        <a href="." class="flex items-center space-x-3 p-2 hover:bg-light_color hover:dark:bg-darker rounded-lg text-dark_color dark:text-light_color">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
          <span class="font-medium text-sm">Kijelentkezés</span>
        </a>
      </div>
    </div>

    <div id="dark-toggle" class="!ml-auto cursor-pointer p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-14 h-14"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
    </div>
  </header>

    <main class="mx-auto w-full max-w-7xl px-4 py-6 md:px-8 md:py-10">
        <section class="mb-6 rounded-3xl border border-slate-200/70 bg-white/80 p-6 shadow-sm backdrop-blur dark:border-slate-700 dark:bg-slate-900/70 md:p-8">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-teal-600 dark:text-teal-400">Stockup</p>
                    <h1 class="mt-1 text-2xl font-bold md:text-3xl">Készlet bevételezés</h1>
                    <p class="mt-2 max-w-2xl text-sm text-slate-600 dark:text-slate-300">Add hozzá a bevételezéseket, ellenőrizd az összesítést a táblázatban, majd egy lépésben véglegesítsd.</p>
                </div>
                <button data-modal-target="stockup_modal" data-modal-toggle="stockup_modal" class="inline-flex items-center justify-center gap-2 rounded-xl bg-plus px-5 py-3 text-sm font-semibold text-white shadow-sm transition duration-300 hover:translate-y-[-1px] hover:bg-dark_plus focus:outline-none focus:ring-4 focus:ring-teal-200 dark:focus:ring-teal-900">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Új tétel hozzáadása
                </button>
            </div>
        </section>

        <section class="rounded-3xl border border-slate-200/70 bg-white/85 p-4 shadow-sm backdrop-blur dark:border-slate-700 dark:bg-slate-900/70 md:p-6">
            <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <h2 class="text-base font-semibold md:text-lg">Függőben lévő bevételezések</h2>
                <div class="flex items-center gap-2">
                    <details class="group rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-800/80">
                        <summary class="cursor-pointer list-none font-medium text-slate-700 dark:text-slate-200">Táblázat oszlopok</summary>
                        <ul id="backend_data_table_dropdown" class="mt-3 max-h-56 min-w-52 space-y-1 overflow-auto"></ul>
                    </details>
                </div>
            </div>

            <div class="rounded-2xl border border-slate-200/70 bg-white/80 p-1 dark:border-slate-700 dark:bg-slate-900/60">
                <table></table>
            </div>
        </section>

        <div class="mt-6 flex justify-end">
            <button id="confirmstockupbtn" class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-sm transition duration-300 hover:translate-y-[-1px] hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-200 dark:focus:ring-emerald-900">
                Bevételezés véglegesítése
            </button>
        </div>
    </main>

    <div id="stockup_modal" tabindex="-1" aria-hidden="true" class="fixed top-0 left-0 right-0 z-50 hidden w-full p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full justify-center items-center backdrop-blur-sm">
        <div class="relative w-full max-w-2xl max-h-full">
            <div class="relative rounded-2xl border border-slate-200 bg-white shadow-xl dark:border-slate-700 dark:bg-slate-800">
                <div class="flex items-start justify-between p-4 border-b border-slate-200 dark:border-slate-700 md:p-5">
                    <h3 class="text-xl font-semibold text-slate-900 dark:text-white">
                        Termék bevételezése
                    </h3>
                    <button type="button" class="text-slate-400 bg-transparent hover:bg-slate-100 hover:text-slate-700 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-slate-700 dark:hover:text-white" data-modal-hide="stockup_modal">
                        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                        <span class="sr-only">Mégsem</span>
                    </button>
                </div>
                <form id="add_stockup_form" class="flex flex-col gap-4">
                    <div class="grid gap-4 grid-cols-2 p-4 md:p-5">
                        <div class="col-span-2">
                            <label for="barcode" class="block mb-2 text-sm font-medium text-slate-900 dark:text-white">Termék vonalkód</label>
                            <input type="text" id="barcode" class="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5 dark:bg-slate-700 dark:border-slate-600 dark:placeholder-slate-400 dark:text-white" required="">
                        </div>
                        <div class="col-span-2">
                            <label for="quantity" class="block mb-2 text-sm font-medium text-slate-900 dark:text-white">Bevételezett darab</label>
                            <input type="number" min="1" step="1" id="quantity" class="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-teal-500 focus:border-teal-500 block w-full p-2.5 dark:bg-slate-700 dark:border-slate-600 dark:placeholder-slate-400 dark:text-white" required="">
                        </div>
                    </div>
                    <div class="flex items-center p-4 space-x-2 border-t border-slate-200 rounded-b dark:border-slate-700 md:p-5">
                        <button id="stockup_submit_btn" type="button" class="text-white bg-teal-600 hover:bg-teal-700 focus:ring-4 focus:outline-none focus:ring-teal-200 font-medium rounded-xl text-sm px-5 py-2.5 text-center dark:bg-teal-600 dark:hover:bg-teal-700 dark:focus:ring-teal-900">
                            Megerősítés
                        </button>
                        <button data-modal-hide="stockup_modal" type="button" class="text-slate-500 bg-white hover:bg-slate-100 focus:ring-4 focus:outline-none focus:ring-slate-200 rounded-xl border border-slate-200 text-sm font-medium px-5 py-2.5 hover:text-slate-900 focus:z-10 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-500 dark:hover:text-white dark:hover:bg-slate-600 dark:focus:ring-slate-700">Mégsem</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script type="module">
      import { darkMode, mobileView } from "../src/main.ts";
      darkMode();
      mobileView();
    </script>
    
    <script type="module" src="../src/components/stockup.ts"></script>
</body>
</html>
