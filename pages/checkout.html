<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassza</title>
    <link rel="stylesheet" href="../src/styles/style.css"/>
    
</head>

<body class="bg-light_color dark:bg-dark_lighter_bg h-screen overflow-hidden">
    <div class="bg-light_header dark:bg-dark_color dark:bg-dark_color-25 h-24 drop-shadow-lg flex flex-row items-center space-x-5 p-3 w-full">
        <a href="index.html">
            <div
                class="p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="w-14 h-14 lucide lucide-log-out-icon lucide-log-out">
                    <path d="m16 17 5-5-5-5" />
                    <path d="M21 12H9" />
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                </svg>
            </div>
        </a>
        <div id="dark-toggle"
            class="!ml-auto cursor-pointer p-2 text-light_color bg-dark_color dark:bg-light_color dark:text-dark_color rounded-full transition duration-300 ease-in-out hover:bg-darker hover:dark:bg-darker_light">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="w-14 h-14 lucide lucide-moon-icon lucide-moon">
                <path
                    d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401" />
            </svg>
        </div>
    </div>
    <div class="grid grid-cols-[100px_1fr]">
        <div class="bg-dark_color w-24 pt-4 h-[calc(100vh-6rem)] flex flex-col items-center space-y-5 dark:bg-opacity-50">
            <button data-modal-category="PEK" class="bg-bread text-dark_color w-20 h-20 flex justify-center items-center rounded-xl transition duration-300 ease-in-out hover:bg-dark_bread">
                <div class="rotate-45 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-14 h-14 lucide lucide-croissant mt-1 ml-1">
                        <path d="M10.2 18H4.774a1.5 1.5 0 0 1-1.352-.97 11 11 0 0 1 .132-6.487" />
                        <path d="M18 10.2V4.774a1.5 1.5 0 0 0-.97-1.352 11 11 0 0 0-6.486.132" />
                        <path d="M18 5a4 3 0 0 1 4 3 2 2 0 0 1-2 2 10 10 0 0 0-5.139 1.42" />
                        <path d="M5 18a3 4 0 0 0 3 4 2 2 0 0 0 2-2 10 10 0 0 1 1.42-5.14" />
                        <path
                            d="M8.709 2.554a10 10 0 0 0-6.155 6.155 1.5 1.5 0 0 0 .676 1.626l9.807 5.42a2 2 0 0 0 2.718-2.718l-5.42-9.807a1.5 1.5 0 0 0-1.626-.676" />
                    </svg>
                </div>
            </button>
            <button data-modal-category="FRI"
                class="bg-green-500 text-dark_color w-20 h-20 flex justify-center items-center rounded-xl transition duration-300 ease-in-out hover:bg-green-600">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="w-14 h-14 lucide lucide-apple-icon lucide-apple">
                    <path d="M12 6.528V3a1 1 0 0 1 1-1h0" />
                    <path
                        d="M18.237 21A15 15 0 0 0 22 11a6 6 0 0 0-10-4.472A6 6 0 0 0 2 11a15.1 15.1 0 0 0 3.763 10 3 3 0 0 0 3.648.648 5.5 5.5 0 0 1 5.178 0A3 3 0 0 0 18.237 21" />
                </svg>
            </button>
            <button data-modal-category="ITA"
                class="bg-cyan-500 text-dark_color w-20 h-20 flex justify-center items-center rounded-xl transition duration-300 ease-in-out hover:bg-cyan-600">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="w-14 h-14 lucide lucide-bottle-wine-icon lucide-bottle-wine">
                    <path
                        d="M10 3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a6 6 0 0 0 1.2 3.6l.6.8A6 6 0 0 1 17 13v8a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1v-8a6 6 0 0 1 1.2-3.6l.6-.8A6 6 0 0 0 10 5z" />
                    <path d="M17 13h-4a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h4" />
                </svg>
            </button>
            <button data-modal-category=""
                class="bg-darker_light text-dark_color w-20 h-20 flex justify-center items-center rounded-xl transition duration-300 ease-in-out hover:bg-dark_grey">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="w-14 h-14 lucide lucide-search-icon lucide-search">
                    <path d="m21 21-4.34-4.34" />
                    <circle cx="11" cy="11" r="8" />
                </svg>
            </button>
        </div>
        <div class="flex flex-col justify-between h-[calc(100vh-6rem)] p-6">
            <table></table>
            <div class="border-t border-gray-300 dark:border-gray-700 pt-4 mt-4 bg-light_color dark:bg-dark_lighter_bg">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-3xl font-bold uppercase text-gray-500 dark:text-gray-200">Fizetendő végösszeg:</span>
                    <span class="text-3xl font-bold text-dark_color dark:text-light_color" id="total-price">0 Ft</span>
                </div>
            
                <div class="grid grid-cols-2 gap-4">
                    <button id="cash" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition duration-200 flex items-center justify-center space-x-2 text-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-banknote"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
                        <span>Készpénz</span>
                    </button>
                    <button id="card" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition duration-200 flex items-center justify-center space-x-2 text-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-credit-card"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                        <span>Bankkártya</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="popup-modal" tabindex="-1"></div>

    <!-- TODO: Fizetés-modal + toast + errormessage if no items in cart -->

    <script type="module">
        import { darkMode } from "../src/main.ts"
        darkMode()
    </script>
    <script type="module" src="../src/components/checkout.ts"></script>
</body>

</html>
